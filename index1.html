<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survival Craft</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        #gameContainer {
            position: relative;
            width: 1024px;
            height: 768px;
            border: 2px solid #444;
            border-radius: 8px;
            overflow: hidden;
            background: #000;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background: #87CEEB;
            cursor: crosshair;
        }
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        #ui > * {
            pointer-events: auto;
        }
        .hud {
            position: absolute;
            color: white;
            font-size: 14px;
            text-shadow: 1px 1px 2px black;
            background: rgba(0,0,0,0.5);
            padding: 4px 8px;
            border-radius: 4px;
        }
        #hpDisplay { top: 10px; left: 10px; }
        #inventory {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 6px;
            background: rgba(0,0,0,0.7);
            padding: 8px 12px;
            border-radius: 12px;
            pointer-events: auto;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 90%;
        }
        .slot {
            width: 50px;
            height: 50px;
            background: rgba(50,50,50,0.8);
            border: 2px solid #888;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            font-size: 12px;
            color: white;
            font-weight: bold;
            image-rendering: pixelated;
        }
        .slot .count {
            position: absolute;
            bottom: 2px;
            right: 4px;
            font-size: 11px;
            color: #fff;
            text-shadow: 1px 1px 1px #000;
        }
        .slot img {
            max-width: 80%;
            max-height: 80%;
            image-rendering: pixelated;
        }
        #recipes {
            position: absolute;
            top: 80px;
            left: 10px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            pointer-events: auto;
            background: rgba(0,0,0,0.6);
            padding: 6px;
            border-radius: 8px;
        }
        .recipe-icon {
            width: 40px;
            height: 40px;
            background: rgba(50,50,50,0.8);
            border: 2px solid #888;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            image-rendering: pixelated;
        }
        .recipe-icon.available {
            border-color: #0f0;
        }
        .recipe-icon.unavailable {
            border-color: #f00;
        }
        .recipe-icon img {
            max-width: 80%;
            max-height: 80%;
            image-rendering: pixelated;
        }
        .recipe-cost {
            font-size: 9px;
            color: white;
            position: absolute;
            bottom: 1px;
            left: 2px;
            right: 2px;
            text-align: center;
            background: rgba(0,0,0,0.5);
            border-radius: 2px;
        }
        #clock {
            position: absolute;
            top: 10px;
            right: 180px;
            width: 70px;
            height: 70px;
            pointer-events: none;
        }
        #minimap {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 150px;
            height: 150px;
            border: 2px solid rgba(255,255,255,0.5);
            border-radius: 8px;
            background: rgba(0,0,0,0.5);
            pointer-events: none;
            image-rendering: pixelated;
        }
        #hints {
            position: absolute;
            bottom: 80px;
            left: 10px;
            color: white;
            font-size: 12px;
            text-shadow: 1px 1px 2px black;
            background: rgba(0,0,0,0.4);
            padding: 4px 8px;
            border-radius: 4px;
            pointer-events: none;
            line-height: 1.6;
        }
        @media (max-width: 1100px) {
            #gameContainer {
                width: 100vw;
                height: 100vh;
                border: none;
                border-radius: 0;
            }
        }
    </style>
</head>
<body>
<div id="gameContainer">
    <canvas id="gameCanvas"></canvas>
    <div id="ui">
        <div id="hpDisplay" class="hud">❤️ 100/100</div>
        <div id="inventory"></div>
        <div id="recipes"></div>
        <div id="clock">
            <canvas id="clockCanvas" width="70" height="70"></canvas>
        </div>
        <canvas id="minimap" width="150" height="150"></canvas>
        <div id="hints">
            WASD — движение<br>
            Зажать ЛКМ — добыча/атака<br>
            ПКМ (с выбором стены) — построить<br>
            5 — выбрать стену
        </div>
    </div>
</div>
<script>
    (function() {
        // ---------- Утилиты ----------
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const WIDTH = 1024, HEIGHT = 768;
        canvas.width = WIDTH;
        canvas.height = HEIGHT;

        // Элементы UI
        const hpDisplay = document.getElementById('hpDisplay');
        const inventoryDiv = document.getElementById('inventory');
        const recipesDiv = document.getElementById('recipes');
        const minimapCanvas = document.getElementById('minimap');
        const minimapCtx = minimapCanvas.getContext('2d');
        const clockCanvas = document.getElementById('clockCanvas');
        const clockCtx = clockCanvas.getContext('2d');

        // Константы
        const PLAYER_SPEED = 3;
        const PLAYER_MAX_HP = 100;
        const PLAYER_MAX_BREATH = 8;
        const RESOURCE_DURABILITY_MAX = 80;
        const DURABILITY_REGEN = 0.5;
        const MINIMAP_SIZE = 150;
        const INVENTORY_SLOTS = 8;
        const SLOT_SIZE = 50;
        const BUILD_COST_WOOD = 5;
        const BUILD_COST_STONE = 3;
        const RECIPE_ICON_SIZE = 40;
        const FPS = 60;

        // Цвета (объект)
        const COLORS = {
            sky_day: '#87CEEB',
            sky_night: '#0A0A1E',
            grass: '#0A460A',
            water: '#1E90FF',
            water_shallow: '#64C8FF',
            tree_leaf: '#228B22',
            rock: '#8C8C8C',
            player_body: '#ADD8E6',
            hand: '#87CEFA',
            hand_outline: '#6496C8',
            building: '#C89664',
            white: '#FFFFFF',
            black: '#000000',
            red: '#FF0000',
            green: '#00FF00',
            blue: '#0000FF',
            brown: '#8B4513',
            gray: '#A9A9A9',
            wood_light: '#D2B48C',
            wood_dark: '#8B5A2B',
            sun: '#FFFF64',
            moon: '#C8C8DC',
            yellow: '#FFFF00',
            slot_bg: 'rgba(50,50,50,0.8)',
            slot_border: '#C8C8C8',
        };

        // ---------- Вспомогательные функции ----------
        function distance(x1,y1,x2,y2) { return Math.hypot(x2-x1, y2-y1); }

        function rand(min,max) { return Math.random()*(max-min)+min; }
        function randInt(min,max) { return Math.floor(rand(min,max+1)); }

        // ---------- Класс Camera ----------
        class Camera {
            constructor(width, height) {
                this.camera = {x:0, y:0};
                this.width = width;
                this.height = height;
                this.smoothX = 0;
                this.smoothY = 0;
            }
            apply(entity) {
                if (entity.rect) {
                    return {
                        x: entity.rect.x + this.camera.x,
                        y: entity.rect.y + this.camera.y,
                        w: entity.rect.w,
                        h: entity.rect.h
                    };
                } else {
                    return {
                        x: entity.x + this.camera.x,
                        y: entity.y + this.camera.y,
                        w: entity.w || 0,
                        h: entity.h || 0
                    };
                }
            }
            applyPoint(x,y) {
                return { x: x + this.camera.x, y: y + this.camera.y };
            }
            update(target) {
                let tx = -target.rect.x - target.rect.w/2 + WIDTH/2;
                let ty = -target.rect.y - target.rect.h/2 + HEIGHT/2;
                tx = Math.max(-(this.width - WIDTH), Math.min(0, tx));
                ty = Math.max(-(this.height - HEIGHT), Math.min(0, ty));
                this.smoothX += (tx - this.smoothX) * 0.1;
                this.smoothY += (ty - this.smoothY) * 0.1;
                this.camera.x = Math.round(this.smoothX);
                this.camera.y = Math.round(this.smoothY);
            }
        }

        // ---------- Класс ExploredMap ----------
        class ExploredMap {
            constructor(mapWidth, mapHeight, cellSize=40) {
                this.cellSize = cellSize;
                this.cols = Math.floor(mapWidth / cellSize);
                this.rows = Math.floor(mapHeight / cellSize);
                this.explored = Array.from({length: this.cols}, () => Array(this.rows).fill(false));
            }
            update(playerPos, radius=3) {
                let cx = Math.floor(playerPos.x / this.cellSize);
                let cy = Math.floor(playerPos.y / this.cellSize);
                for (let dx = -radius; dx <= radius; dx++) {
                    for (let dy = -radius; dy <= radius; dy++) {
                        let x = cx + dx, y = cy + dy;
                        if (x>=0 && x<this.cols && y>=0 && y<this.rows) {
                            if (Math.hypot(dx,dy) <= radius) {
                                this.explored[x][y] = true;
                            }
                        }
                    }
                }
            }
            isExplored(x,y) {
                let cx = Math.floor(x / this.cellSize);
                let cy = Math.floor(y / this.cellSize);
                if (cx>=0 && cx<this.cols && cy>=0 && cy<this.rows) {
                    return this.explored[cx][cy];
                }
                return false;
            }
        }

        // ---------- Класс Decoration ----------
        class Decoration {
            constructor(x,y,type) {
                this.x=x; this.y=y; this.type=type;
                if (type==='leaf') {
                    this.radius = randInt(4,8);
                    this.color = ['#32C832','#FFC832','#FF9632'][randInt(0,2)];
                } else {
                    this.radius = randInt(3,6);
                    this.color = '#969696';
                }
                this.rect = {x: x-this.radius, y: y-this.radius, w: this.radius*2, h: this.radius*2};
            }
            draw(ctx, camera) {
                let r = camera.applyPoint(this.x, this.y);
                ctx.beginPath();
                ctx.arc(r.x, r.y, this.radius, 0, Math.PI*2);
                ctx.fillStyle = this.color;
                ctx.fill();
            }
        }

        // ---------- Класс Tree ----------
        class Tree {
            constructor(x,y) {
                this.x=x; this.y=y;
                this.w = randInt(70*1.5, 100*1.5);
                this.h = randInt(80*1.5, 120*1.5);
                this.rect = {x, y, w:this.w, h:this.h};
                this.durability = RESOURCE_DURABILITY_MAX;
                this.maxDurability = RESOURCE_DURABILITY_MAX;
                this.color = `rgb(${randInt(20,60)},${randInt(100,180)},${randInt(20,60)})`;
            }
            draw(ctx, camera) {
                let r = camera.apply(this);
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.roundRect(r.x, r.y, r.w, r.h, 5);
                ctx.fill();
            }
            contains(px,py) {
                return px >= this.rect.x && px <= this.rect.x+this.rect.w &&
                       py >= this.rect.y && py <= this.rect.y+this.rect.h;
            }
            regenerate() {
                if (this.durability < this.maxDurability) {
                    this.durability += DURABILITY_REGEN / FPS;
                    if (this.durability > this.maxDurability) this.durability = this.maxDurability;
                }
            }
        }

        // ---------- Класс Rock ----------
        class Rock {
            constructor(x,y) {
                this.x=x; this.y=y;
                this.w = randInt(50*1.4, 70*1.4);
                this.h = randInt(40*1.4, 60*1.4);
                this.rect = {x, y, w:this.w, h:this.h};
                this.durability = RESOURCE_DURABILITY_MAX;
                this.maxDurability = RESOURCE_DURABILITY_MAX;
                this.points = [];
                let num = randInt(10,14);
                for (let i=0; i<num; i++) {
                    let angle = 2*Math.PI * i/num;
                    let rx = this.w/2 * rand(0.7,1.0);
                    let ry = this.h/2 * rand(0.7,1.0);
                    let px = this.x + this.w/2 + rx*Math.cos(angle);
                    let py = this.y + this.h/2 + ry*Math.sin(angle);
                    this.points.push({x:px, y:py});
                }
            }
            draw(ctx, camera) {
                let pts = this.points.map(p => {
                    let r = camera.applyPoint(p.x, p.y);
                    return {x:r.x, y:r.y};
                });
                if (pts.length < 3) return;
                ctx.beginPath();
                ctx.moveTo(pts[0].x, pts[0].y);
                for (let i=1; i<pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
                ctx.closePath();
                ctx.fillStyle = COLORS.rock;
                ctx.fill();
                ctx.strokeStyle = '#646464';
                ctx.lineWidth = 2;
                ctx.stroke();
            }
            contains(px,py) {
                // Приблизительно по прямоугольнику
                return px >= this.rect.x && px <= this.rect.x+this.rect.w &&
                       py >= this.rect.y && py <= this.rect.y+this.rect.h;
            }
            regenerate() {
                if (this.durability < this.maxDurability) {
                    this.durability += DURABILITY_REGEN / FPS;
                    if (this.durability > this.maxDurability) this.durability = this.maxDurability;
                }
            }
        }

        // ---------- Класс Lake ----------
        class Lake {
            constructor(x,y) {
                this.rects = [];
                let w = randInt(150,250);
                let h = randInt(100,180);
                this.rects.push({x, y, w, h});
                for (let i=0; i<randInt(1,2); i++) {
                    let side = ['left','right','top','bottom'][randInt(0,3)];
                    let r2;
                    if (side==='left') r2 = {x: x-randInt(30,60), y: y+randInt(20,h-40), w: randInt(40,70), h: randInt(40,70)};
                    else if (side==='right') r2 = {x: x+w-randInt(30,60), y: y+randInt(20,h-40), w: randInt(40,70), h: randInt(40,70)};
                    else if (side==='top') r2 = {x: x+randInt(20,w-40), y: y-randInt(30,50), w: randInt(40,70), h: randInt(40,70)};
                    else r2 = {x: x+randInt(20,w-40), y: y+h-randInt(30,50), w: randInt(40,70), h: randInt(40,70)};
                    this.rects.push(r2);
                }
            }
            draw(ctx, camera) {
                for (let r of this.rects) {
                    let rr = camera.apply(r);
                    ctx.fillStyle = COLORS.water;
                    ctx.fillRect(rr.x, rr.y, rr.w, rr.h);
                    for (let i=0; i<4; i++) {
                        let bx = rr.x + rand(0, rr.w);
                        let by = rr.y + rand(0, rr.h);
                        ctx.beginPath();
                        ctx.arc(bx, by, 3, 0, 2*Math.PI);
                        ctx.fillStyle = COLORS.water_shallow;
                        ctx.fill();
                    }
                }
            }
            contains(px,py) {
                for (let r of this.rects) {
                    if (px>=r.x && px<=r.x+r.w && py>=r.y && py<=r.y+r.h) return true;
                }
                return false;
            }
            getBoundaryPoints(margin=30) {
                let pts = [];
                for (let r of this.rects) {
                    let step = 25;
                    for (let x=r.x; x<r.x+r.w; x+=step) {
                        pts.push({x:x, y:r.y-margin});
                        pts.push({x:x, y:r.y+r.h+margin});
                    }
                    for (let y=r.y; y<r.y+r.h; y+=step) {
                        pts.push({x:r.x-margin, y:y});
                        pts.push({x:r.x+r.w+margin, y:y});
                    }
                }
                return pts;
            }
        }

        // ---------- Класс Player ----------
        class Player {
            constructor(x,y) {
                this.rect = {x, y, w:40, h:60};
                this.x = x; this.y = y;
                this.w = 40; this.h = 60;
                this.hp = PLAYER_MAX_HP;
                this.maxHp = PLAYER_MAX_HP;
                this.breath = PLAYER_MAX_BREATH;
                this.maxBreath = PLAYER_MAX_BREATH;
                this.inventory = new Array(INVENTORY_SLOTS).fill(null);
                this.speed = PLAYER_SPEED;
                this.attackCooldown = 0;
                this.attackRange = 150;
                this.underwater = false;
                this.attackPhase = 0;
                this.attackTimer = 0;
                this.attackDuration = 0.8;
                this.attackHandOffset = 0;
                this.currentAngle = 0;
                // Для UI
                this.inventorySlots = [];
            }
            addItem(type, count=1) {
                for (let i=0; i<this.inventory.length; i++) {
                    let slot = this.inventory[i];
                    if (slot && slot.type===type) {
                        slot.count += count;
                        return true;
                    }
                }
                for (let i=0; i<this.inventory.length; i++) {
                    if (!this.inventory[i]) {
                        this.inventory[i] = {type, count};
                        return true;
                    }
                }
                return false;
            }
            hasItem(type, count=1) {
                let total = 0;
                for (let slot of this.inventory) {
                    if (slot && slot.type===type) {
                        total += slot.count;
                        if (total >= count) return true;
                    }
                }
                return false;
            }
            removeItem(type, count=1) {
                for (let i=0; i<this.inventory.length; i++) {
                    let slot = this.inventory[i];
                    if (slot && slot.type===type) {
                        if (slot.count >= count) {
                            slot.count -= count;
                            if (slot.count===0) this.inventory[i] = null;
                            return true;
                        } else {
                            count -= slot.count;
                            this.inventory[i] = null;
                        }
                    }
                }
                return false;
            }
            update(keys, world) {
                let dx=0, dy=0;
                let speed = this.speed;
                // Проверка под водой
                this.underwater = world.isUnderwater(this.x+this.w/2, this.y+this.h/2);
                if (this.underwater) speed *= 0.5;

                if (keys['w'] || keys['W']) dy = -speed;
                if (keys['s'] || keys['S']) dy = speed;
                if (keys['a'] || keys['A']) dx = -speed;
                if (keys['d'] || keys['D']) dx = speed;
                if (dx!==0 && dy!==0) { dx/=Math.SQRT2; dy/=Math.SQRT2; }

                let newX = this.x + dx;
                let newY = this.y + dy;

                // Проверка коллизий
                let testRect = {x:newX, y:this.y, w:this.w, h:this.h};
                if (newX>=0 && newX<=world.width-this.w && !world.checkCollisions(testRect)) this.x = newX;
                testRect = {x:this.x, y:newY, w:this.w, h:this.h};
                if (newY>=0 && newY<=world.height-this.h && !world.checkCollisions(testRect)) this.y = newY;

                this.rect.x = this.x; this.rect.y = this.y;

                // Дыхание
                if (this.underwater) {
                    this.breath -= 1/FPS;
                    if (this.breath <= 0) {
                        this.hp -= 20/FPS;
                        if (this.hp < 0) this.hp = 0;
                    }
                } else {
                    if (this.breath < this.maxBreath) {
                        this.breath += 0.5/FPS;
                        if (this.breath > this.maxBreath) this.breath = this.maxBreath;
                    }
                }

                // Анимация удара
                if (this.attackPhase !== 0) {
                    this.attackTimer += 1/FPS;
                    if (this.attackTimer >= this.attackDuration/2) {
                        if (this.attackPhase === 1) {
                            this.attackPhase = 2;
                            this.attackTimer = 0;
                        } else if (this.attackPhase === 2) {
                            this.attackPhase = 0;
                            this.attackTimer = 0;
                        }
                    }
                    let progress = this.attackTimer / (this.attackDuration/2);
                    if (this.attackPhase === 1) {
                        this.attackHandOffset = -25 * Math.sin(progress * Math.PI);
                    } else if (this.attackPhase === 2) {
                        this.attackHandOffset = -25 * Math.sin(progress * Math.PI);
                    }
                }

                if (this.attackCooldown > 0) this.attackCooldown--;

                // Автоматическая атака при зажатой ЛКМ (обрабатывается в основном цикле)
                // Поворот тела
                let mouseX = window._mouseX || 0;
                let mouseY = window._mouseY || 0;
                let worldMouseX = mouseX - world.camera.camera.x;
                let worldMouseY = mouseY - world.camera.camera.y;
                let dxAngle = worldMouseX - (this.x + this.w/2);
                let dyAngle = worldMouseY - (this.y + this.h/2);
                let vectorAngle = Math.atan2(dyAngle, dxAngle);
                let targetAngle = vectorAngle - Math.PI/2;
                let diff = targetAngle - this.currentAngle;
                while (diff > Math.PI) diff -= 2*Math.PI;
                while (diff < -Math.PI) diff += 2*Math.PI;
                this.currentAngle += diff * 0.12;
            }
            attack(world) {
                if (this.attackCooldown > 0) return;
                let centerX = this.x + this.w/2;
                let centerY = this.y + this.h/2;
                let target = null;
                let minDist = this.attackRange;
                for (let obj of world.trees) {
                    let d = distance(centerX, centerY, obj.x+obj.w/2, obj.y+obj.h/2);
                    if (d < minDist) { minDist = d; target = obj; }
                }
                for (let obj of world.rocks) {
                    let d = distance(centerX, centerY, obj.x+obj.w/2, obj.y+obj.h/2);
                    if (d < minDist) { minDist = d; target = obj; }
                }
                if (target && target.durability > 0) {
                    // Проверка на кирку для камня
                    if (target instanceof Rock) {
                        if (!this.hasItem('wooden_pickaxe') && !this.hasItem('stone_pickaxe')) return;
                    }
                    // Добыча
                    if (target instanceof Tree) {
                        let amt = randInt(2,4);
                        if (this.hasItem('stone_pickaxe')) amt += 2;
                        else if (this.hasItem('wooden_pickaxe')) amt += 1;
                        this.addItem('wood', amt);
                    } else {
                        let amt = randInt(1,3);
                        if (this.hasItem('stone_pickaxe')) amt += 2;
                        else if (this.hasItem('wooden_pickaxe')) amt += 1;
                        this.addItem('stone', amt);
                    }
                    target.durability -= 6;
                    if (target.durability < 0) target.durability = 0;
                    this.attackCooldown = 0.8 * FPS;
                    this.attackPhase = 1;
                    this.attackTimer = 0;
                }
            }
            draw(ctx, camera) {
                let bodySurf = document.createElement('canvas');
                bodySurf.width = this.h;
                bodySurf.height = this.w;
                let bctx = bodySurf.getContext('2d');
                // Тело
                bctx.fillStyle = COLORS.player_body;
                bctx.beginPath();
                bctx.roundRect(0,0,this.h,this.w,8);
                bctx.fill();
                // Руки
                let handRadius = 12;
                let margin = 0;
                let lx = handRadius + margin;
                let rx = this.h - handRadius - margin;
                let ly = this.w/2;
                let ry = this.w/2;
                let offsetL=0, offsetR=0;
                if (this.attackPhase===1) offsetL = this.attackHandOffset;
                else if (this.attackPhase===2) offsetR = this.attackHandOffset;

                bctx.beginPath();
                bctx.arc(lx, ly+offsetL, handRadius, 0, 2*Math.PI);
                bctx.fillStyle = COLORS.hand;
                bctx.fill();
                bctx.strokeStyle = COLORS.hand_outline;
                bctx.lineWidth = 2;
                bctx.stroke();

                bctx.beginPath();
                bctx.arc(rx, ry+offsetR, handRadius, 0, 2*Math.PI);
                bctx.fillStyle = COLORS.hand;
                bctx.fill();
                bctx.strokeStyle = COLORS.hand_outline;
                bctx.stroke();

                // Поворот
                let angleDeg = -this.currentAngle * 180/Math.PI;
                let rotated = document.createElement('canvas');
                rotated.width = this.h;
                rotated.height = this.w;
                let rctx = rotated.getContext('2d');
                rctx.translate(this.h/2, this.w/2);
                rctx.rotate(angleDeg * Math.PI/180);
                rctx.drawImage(bodySurf, -this.h/2, -this.w/2);

                // Применяем камеру
                let cx = this.x + this.w/2;
                let cy = this.y + this.h/2;
                let p = camera.applyPoint(cx, cy);
                let dx = p.x - cx;
                let dy = p.y - cy;
                // Рисуем на основном холсте
                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(angleDeg * Math.PI/180);
                ctx.drawImage(bodySurf, -this.h/2, -this.w/2);
                ctx.restore();

                // Полоски здоровья и дыхания
                let barW = 50, barH = 6;
                let hpRatio = this.hp / this.maxHp;
                let bx = this.x + (this.w - barW)/2;
                let by = this.y - 15;
                let br = camera.applyPoint(bx, by);
                ctx.fillStyle = COLORS.red;
                ctx.fillRect(br.x, br.y, barW, barH);
                ctx.fillStyle = COLORS.green;
                ctx.fillRect(br.x, br.y, barW*hpRatio, barH);
                if (this.underwater) {
                    let breathRatio = Math.max(0, this.breath / this.maxBreath);
                    let bb = camera.applyPoint(bx, by-10);
                    ctx.fillStyle = COLORS.blue;
                    ctx.fillRect(bb.x, bb.y, barW, 4);
                    ctx.fillStyle = COLORS.white;
                    ctx.fillRect(bb.x, bb.y, barW*breathRatio, 4);
                }
            }
        }

        // ---------- Класс Building ----------
        class Building {
            constructor(x,y,w=40,h=40) {
                this.rect = {x,y,w,h};
                this.hp = 50;
                this.maxHp = 50;
            }
            draw(ctx, camera) {
                let r = camera.apply(this.rect);
                ctx.fillStyle = COLORS.building;
                ctx.fillRect(r.x, r.y, r.w, r.h);
                ctx.strokeStyle = COLORS.brown;
                ctx.lineWidth = 2;
                ctx.strokeRect(r.x, r.y, r.w, r.h);
            }
        }

        // ---------- Класс World ----------
        class World {
            constructor(width, height) {
                this.width = width;
                this.height = height;
                this.trees = [];
                this.rocks = [];
                this.lakes = [];
                this.buildings = [];
                this.decorations = [];
                this.explored = new ExploredMap(width, height);
                this.camera = null;
                this.generate();
            }
            generate() {
                // Озёра
                for (let i=0; i<randInt(2,3); i++) {
                    let x = randInt(150, this.width-350);
                    let y = randInt(150, this.height-300);
                    let lake = new Lake(x,y);
                    this.lakes.push(lake);
                }
                // Деревья у озёр
                for (let lake of this.lakes) {
                    let pts = lake.getBoundaryPoints(40);
                    let num = randInt(3,5);
                    let chosen = [];
                    let indices = Array.from({length:pts.length}, (_,i)=>i);
                    for (let i=0; i<num; i++) {
                        let idx = randInt(0, indices.length-1);
                        chosen.push(indices[idx]);
                        indices.splice(idx,1);
                        if (indices.length===0) break;
                    }
                    for (let idx of chosen) {
                        let p = pts[idx];
                        if (!this.isUnderwater(p.x, p.y)) {
                            this.trees.push(new Tree(p.x-30, p.y-30));
                        }
                    }
                }
                // Случайные деревья и камни
                for (let i=0; i<25; i++) {
                    let x = randInt(60, this.width-60);
                    let y = randInt(60, this.height-60);
                    if (!this.isUnderwater(x,y)) {
                        this.trees.push(new Tree(x,y));
                    }
                }
                for (let i=0; i<18; i++) {
                    let x = randInt(60, this.width-60);
                    let y = randInt(60, this.height-60);
                    if (!this.isUnderwater(x,y)) {
                        this.rocks.push(new Rock(x,y));
                    }
                }
                // Декорации
                for (let i=0; i<40; i++) {
                    let x = randInt(20, this.width-20);
                    let y = randInt(20, this.height-20);
                    if (!this.isUnderwater(x,y)) {
                        let type = Math.random()<0.5 ? 'leaf' : 'pebble';
                        this.decorations.push(new Decoration(x,y,type));
                    }
                }
            }
            isUnderwater(px,py) {
                for (let lake of this.lakes) {
                    if (lake.contains(px,py)) return true;
                }
                return false;
            }
            checkCollisions(rect) {
                for (let tree of this.trees) {
                    if (rect.x < tree.rect.x+tree.rect.w && rect.x+rect.w > tree.rect.x &&
                        rect.y < tree.rect.y+tree.rect.h && rect.y+rect.h > tree.rect.y) return true;
                }
                for (let rock of this.rocks) {
                    if (rect.x < rock.rect.x+rock.rect.w && rect.x+rect.w > rock.rect.x &&
                        rect.y < rock.rect.y+rock.rect.h && rect.y+rect.h > rock.rect.y) return true;
                }
                return false;
            }
            getFreePosition(size) {
                for (let i=0; i<100; i++) {
                    let x = randInt(50, this.width-size[0]-50);
                    let y = randInt(50, this.height-size[1]-50);
                    let rect = {x,y,w:size[0],h:size[1]};
                    if (!this.checkCollisions(rect) && !this.isUnderwater(x+size[0]/2, y+size[1]/2)) {
                        return {x,y};
                    }
                }
                return {x: this.width/2 - size[0]/2, y: this.height/2 - size[1]/2};
            }
            update(player) {
                this.explored.update({x: player.x, y: player.y});
                for (let t of this.trees) t.regenerate();
                for (let r of this.rocks) r.regenerate();
            }
            draw(ctx, camera) {
                // Трава
                let gr = camera.apply({x:0,y:0,w:this.width,h:this.height});
                ctx.fillStyle = COLORS.grass;
                ctx.fillRect(gr.x, gr.y, gr.w, gr.h);

                for (let d of this.decorations) d.draw(ctx, camera);
                for (let l of this.lakes) l.draw(ctx, camera);
                for (let t of this.trees) t.draw(ctx, camera);
                for (let r of this.rocks) r.draw(ctx, camera);
                for (let b of this.buildings) b.draw(ctx, camera);
            }
        }

        // ---------- Класс WoodenClock ----------
        class WoodenClock {
            constructor(x,y,radius=50) {
                this.x=x; this.y=y; this.radius=radius;
            }
            draw(ctx, timeRatio) {
                ctx.clearRect(0,0,70,70);
                // Внешнее кольцо
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, 2*Math.PI);
                ctx.fillStyle = COLORS.wood_dark;
                ctx.fill();
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius-4, 0, 2*Math.PI);
                ctx.fillStyle = COLORS.wood_light;
                ctx.fill();
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius-8, 0, 2*Math.PI);
                ctx.fillStyle = '#32321E';
                ctx.fill();

                let offset = 28;
                // Солнце
                let sunX = this.x, sunY = this.y - this.radius + offset;
                ctx.beginPath();
                ctx.arc(sunX, sunY, 14, 0, 2*Math.PI);
                ctx.fillStyle = COLORS.sun;
                ctx.fill();
                ctx.beginPath();
                ctx.arc(sunX, sunY, 11, 0, 2*Math.PI);
                ctx.fillStyle = COLORS.sun;
                ctx.fill();
                // Луна
                let moonX = this.x, moonY = this.y + this.radius - offset;
                ctx.beginPath();
                ctx.arc(moonX, moonY, 14, 0, 2*Math.PI);
                ctx.fillStyle = COLORS.moon;
                ctx.fill();
                ctx.beginPath();
                ctx.arc(moonX, moonY, 11, 0, 2*Math.PI);
                ctx.fillStyle = '#B4B4C8';
                ctx.fill();

                // Полоска
                let barW = 2*(this.radius-10);
                let barX = this.x - barW/2;
                let barY = this.y - 3;
                ctx.fillStyle = COLORS.wood_dark;
                ctx.beginPath();
                ctx.roundRect(barX, barY, barW, 6, 3);
                ctx.fill();

                // Стрелка
                let angle = (timeRatio - 0.5) * Math.PI;
                let arrowLen = this.radius - 16;
                let endX = this.x + arrowLen * Math.sin(angle);
                let endY = this.y - arrowLen * Math.cos(angle);
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(endX, endY);
                ctx.strokeStyle = COLORS.black;
                ctx.lineWidth = 4;
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(endX, endY, 6, 0, 2*Math.PI);
                ctx.fillStyle = COLORS.black;
                ctx.fill();
            }
        }

        // ---------- Класс DayNightCycle ----------
        class DayNightCycle {
            constructor() {
                this.time = 0;
                this.speed = 5;
                this.dayLength = 1440;
            }
            update() {
                this.time += this.speed / FPS;
                if (this.time >= this.dayLength) this.time -= this.dayLength;
            }
            getSkyColor() {
                let t = this.time;
                if (t < 360) {
                    let ratio = t / 360;
                    let r = Math.round(135*ratio + 10*(1-ratio));
                    let g = Math.round(206*ratio + 10*(1-ratio));
                    let b = Math.round(235*ratio + 30*(1-ratio));
                    return `rgb(${r},${g},${b})`;
                } else if (t < 720) {
                    return COLORS.sky_day;
                } else if (t < 1080) {
                    let ratio = (t-720)/360;
                    let r = Math.round(135*(1-ratio) + 10*ratio);
                    let g = Math.round(206*(1-ratio) + 10*ratio);
                    let b = Math.round(235*(1-ratio) + 30*ratio);
                    return `rgb(${r},${g},${b})`;
                } else {
                    return COLORS.sky_night;
                }
            }
            getTimeRatio() {
                return this.time / this.dayLength;
            }
        }

        // ---------- Основной класс Game ----------
        class Game {
            constructor() {
                this.world = new World(2500,2500);
                this.camera = new Camera(this.world.width, this.world.height);
                let pos = this.world.getFreePosition([40,60]);
                this.player = new Player(pos.x, pos.y);
                this.world.camera = this.camera;
                this.dayNight = new DayNightCycle();
                this.selectedBuilding = null;
                this.clockWidget = new WoodenClock(35,35,30); // в canvas 70x70
                this.recipes = [
                    {item:'wooden_pickaxe', name:'Wood Pick', cost:{wood:15}, icon: this.createToolIcon('#8B5A2B','Pick')},
                    {item:'stone_pickaxe', name:'Stone Pick', cost:{wood:30, stone:10}, icon: this.createToolIcon('#808080','Pick')},
                    {item:'wooden_sword', name:'Wood Sword', cost:{wood:25}, icon: this.createToolIcon('#8B5A2B','Sword')},
                    {item:'stone_sword', name:'Stone Sword', cost:{wood:40, stone:20}, icon: this.createToolIcon('#808080','Sword')},
                ];
                this.keys = {};
                this.mouseX = 0;
                this.mouseY = 0;
                this.leftMouseDown = false;
                this.setupInput();
                this.updateUI();
                this.lastTime = performance.now();
                this.loop = this.loop.bind(this);
                requestAnimationFrame(this.loop);
            }
            setupInput() {
                window.addEventListener('keydown', (e) => {
                    this.keys[e.key] = true;
                    if (e.key === '5') {
                        this.selectedBuilding = (this.selectedBuilding==='wall' ? null : 'wall');
                        this.updateUI();
                    }
                    if (e.key === 'Escape') {
                        // можно выйти, но оставим
                    }
                });
                window.addEventListener('keyup', (e) => {
                    this.keys[e.key] = false;
                });
                canvas.addEventListener('mousemove', (e) => {
                    const rect = canvas.getBoundingClientRect();
                    const scaleX = canvas.width / rect.width;
                    const scaleY = canvas.height / rect.height;
                    this.mouseX = (e.clientX - rect.left) * scaleX;
                    this.mouseY = (e.clientY - rect.top) * scaleY;
                    window._mouseX = this.mouseX;
                    window._mouseY = this.mouseY;
                });
                canvas.addEventListener('mousedown', (e) => {
                    if (e.button === 0) {
                        this.leftMouseDown = true;
                        // Проверяем клик по рецептам
                        let mx = this.mouseX, my = this.mouseY;
                        let recipeX = 10, recipeY = 80;
                        for (let i=0; i<this.recipes.length; i++) {
                            let rx = recipeX, ry = recipeY + i*(RECIPE_ICON_SIZE+10);
                            if (mx >= rx && mx <= rx+RECIPE_ICON_SIZE && my >= ry && my <= ry+RECIPE_ICON_SIZE) {
                                this.craftItem(this.recipes[i].item);
                                break;
                            }
                        }
                    }
                    if (e.button === 2) {
                        // ПКМ - построить стену
                        if (this.selectedBuilding === 'wall') {
                            let worldX = this.mouseX - this.camera.camera.x;
                            let worldY = this.mouseY - this.camera.camera.y;
                            if (this.player.hasItem('wood', BUILD_COST_WOOD) && this.player.hasItem('stone', BUILD_COST_STONE)) {
                                this.player.removeItem('wood', BUILD_COST_WOOD);
                                this.player.removeItem('stone', BUILD_COST_STONE);
                                this.world.buildings.push(new Building(worldX, worldY));
                                this.updateUI();
                            }
                        }
                    }
                });
                canvas.addEventListener('mouseup', (e) => {
                    if (e.button === 0) this.leftMouseDown = false;
                });
                canvas.addEventListener('contextmenu', (e) => e.preventDefault());
                // Для мобильных можно добавить touch, но пока пропускаем
            }
            craftItem(itemId) {
                let recipe = this.recipes.find(r => r.item === itemId);
                if (!recipe) return;
                let can = true;
                for (let [res, amt] of Object.entries(recipe.cost)) {
                    if (!this.player.hasItem(res, amt)) { can = false; break; }
                }
                if (can) {
                    for (let [res, amt] of Object.entries(recipe.cost)) {
                        this.player.removeItem(res, amt);
                    }
                    this.player.addItem(itemId, 1);
                    this.updateUI();
                }
            }
            createToolIcon(color, type) {
                // Создаём canvas иконку
                let c = document.createElement('canvas');
                c.width = 40; c.height = 40;
                let ctx = c.getContext('2d');
                if (type === 'Pick') {
                    ctx.fillStyle = color;
                    ctx.fillRect(15,10,10,25);
                    ctx.beginPath();
                    ctx.moveTo(10,10); ctx.lineTo(30,10); ctx.lineTo(25,0); ctx.lineTo(15,0); ctx.closePath();
                    ctx.fill();
                } else {
                    ctx.fillStyle = color;
                    ctx.fillRect(18,5,4,30);
                    ctx.beginPath();
                    ctx.moveTo(12,5); ctx.lineTo(28,5); ctx.lineTo(22,15); ctx.lineTo(18,15); ctx.closePath();
                    ctx.fill();
                }
                return c;
            }
            createWoodIcon() {
                let c = document.createElement('canvas');
                c.width = 40; c.height = 40;
                let ctx = c.getContext('2d');
                ctx.fillStyle = '#654321';
                ctx.fillRect(10,5,20,30);
                ctx.fillStyle = '#228B22';
                ctx.fillRect(5,0,30,15);
                return c;
            }
            createStoneIcon() {
                let c = document.createElement('canvas');
                c.width = 40; c.height = 40;
                let ctx = c.getContext('2d');
                ctx.fillStyle = '#808080';
                ctx.beginPath();
                ctx.ellipse(20,20,15,10,0,0,2*Math.PI);
                ctx.fill();
                return c;
            }
            updateUI() {
                // Обновляем инвентарь
                let html = '';
                for (let i=0; i<INVENTORY_SLOTS; i++) {
                    let slot = this.player.inventory[i];
                    let content = '';
                    if (slot) {
                        let icon = this.getIconForType(slot.type);
                        content = `<img src="${icon}" class="slot-icon">`;
                        if (slot.count > 1) content += `<span class="count">${slot.count}</span>`;
                    }
                    html += `<div class="slot">${content}</div>`;
                }
                inventoryDiv.innerHTML = html;

                // Рецепты
                let recHtml = '';
                for (let r of this.recipes) {
                    let can = true;
                    let costStr = '';
                    for (let [res, amt] of Object.entries(r.cost)) {
                        if (!this.player.hasItem(res, amt)) can = false;
                        costStr += amt + res[0].toUpperCase() + ' ';
                    }
                    let cls = can ? 'available' : 'unavailable';
                    let iconData = r.icon.toDataURL();
                    recHtml += `<div class="recipe-icon ${cls}" data-item="${r.item}">
                        <img src="${iconData}">
                        <span class="recipe-cost">${costStr}</span>
                    </div>`;
                }
                recipesDiv.innerHTML = recHtml;
                // Вешаем обработчики на рецепты
                document.querySelectorAll('.recipe-icon').forEach(el => {
                    el.addEventListener('click', (e) => {
                        let item = el.dataset.item;
                        this.craftItem(item);
                    });
                });

                // HP
                hpDisplay.textContent = `❤️ ${Math.round(this.player.hp)}/${this.player.maxHp}`;

                // Кнопка стены (визуально)
                // В подсказках уже есть.
            }
            getIconForType(type) {
                let c;
                if (type === 'wood') c = this.createWoodIcon();
                else if (type === 'stone') c = this.createStoneIcon();
                else if (type === 'wooden_pickaxe') c = this.createToolIcon('#8B5A2B','Pick');
                else if (type === 'stone_pickaxe') c = this.createToolIcon('#808080','Pick');
                else if (type === 'wooden_sword') c = this.createToolIcon('#8B5A2B','Sword');
                else if (type === 'stone_sword') c = this.createToolIcon('#808080','Sword');
                else c = document.createElement('canvas');
                return c.toDataURL();
            }
            loop(timestamp) {
                let dt = Math.min((timestamp - this.lastTime) / 1000, 0.05);
                this.lastTime = timestamp;
                // Обновление
                this.player.update(this.keys, this.world);
                // Атака если зажата ЛКМ
                if (this.leftMouseDown) {
                    this.player.attack(this.world);
                }
                this.world.update(this.player);
                this.dayNight.update();
                this.camera.update(this.player);

                // Отрисовка
                this.draw();
                this.updateUI();
                requestAnimationFrame(this.loop);
            }
            draw() {
                const ctx = canvas.getContext('2d');
                let sky = this.dayNight.getSkyColor();
                ctx.fillStyle = sky;
                ctx.fillRect(0,0,WIDTH,HEIGHT);

                this.world.draw(ctx, this.camera);
                this.player.draw(ctx, this.camera);

                // Мини-карта
                this.drawMinimap();
                // Часы
                let timeRatio = this.dayNight.getTimeRatio();
                this.clockWidget.draw(clockCtx, timeRatio);
            }
            drawMinimap() {
                const ctx = minimapCtx;
                ctx.clearRect(0,0,150,150);
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(0,0,150,150);
                let scaleX = 150 / this.world.width;
                let scaleY = 150 / this.world.height;
                let explored = this.world.explored;
                for (let cx=0; cx<explored.cols; cx++) {
                    for (let cy=0; cy<explored.rows; cy++) {
                        if (explored.explored[cx][cy]) {
                            let x = cx * explored.cellSize;
                            let y = cy * explored.cellSize;
                            let mx = x * scaleX;
                            let my = y * scaleY;
                            let mw = explored.cellSize * scaleX + 1;
                            let mh = explored.cellSize * scaleY + 1;
                            let color = COLORS.grass;
                            // Проверка воды
                            for (let lake of this.world.lakes) {
                                if (lake.contains(x+20, y+20)) { color = COLORS.water; break; }
                            }
                            ctx.fillStyle = color;
                            ctx.fillRect(mx, my, mw, mh);
                        }
                    }
                }
                // Игрок
                let px = this.player.x * scaleX;
                let py = this.player.y * scaleY;
                ctx.fillStyle = COLORS.player_body;
                ctx.beginPath();
                ctx.arc(px, py, 4, 0, 2*Math.PI);
                ctx.fill();
                ctx.strokeStyle = COLORS.white;
                ctx.lineWidth = 1;
                ctx.strokeRect(0,0,150,150);
            }
        }

        // Polyfill roundRect если нет
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, radii) {
                let r = typeof radii === 'number' ? radii : (radii || 0);
                this.moveTo(x + r, y);
                this.arcTo(x + w, y, x + w, y + h, r);
                this.arcTo(x + w, y + h, x, y + h, r);
                this.arcTo(x, y + h, x, y, r);
                this.arcTo(x, y, x + w, y, r);
                return this;
            };
        }

        // Запуск
        window.onload = () => {
            const game = new Game();
        };
    })();
</script>
